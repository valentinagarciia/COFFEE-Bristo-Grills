<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear Cuenta</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    height:100vh;
    background:url('img/login.jpg') no-repeat center center fixed;
    background-size:cover;
}

body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
}

.contenedor{
    position:relative;
    z-index:1;
    max-width:400px;
    margin:auto;
    top:50%;
    transform:translateY(-50%);
    background:rgba(255,255,255,.95);
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    color:#0072ff;
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:18px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

input:focus{
    border-color:#0072ff;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0072ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#005ecc;
}

.volver{
    text-align:center;
    margin-top:15px;
}

.volver a{
    color:#0072ff;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="contenedor">
    <h2>Crear Cuenta</h2>

    <form id="formRegistro">

        <label>Usuario</label>
        <input type="text" id="nuevoUsuario" required>

        <label>Contraseña</label>
        <input type="password" id="nuevaContrasena" required>

        <button type="submit">Registrarme</button>

    </form>

    <div class="volver">
        <a href="login.html">Volver al inicio de sesión</a>
    </div>
</div>

<script>
document.getElementById("formRegistro").addEventListener("submit", function(e){

    e.preventDefault();

    const usuario = document.getElementById("nuevoUsuario").value;
    const contrasena = document.getElementById("nuevaContrasena").value;

    localStorage.setItem("usuario", usuario);
    localStorage.setItem("contrasena", contrasena);

    alert("Cuenta creada correctamente");

    window.location.href = "login.html";
});
</script>

</body>
</html>
