<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      background: url('img/login.jpg') no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    .login-box {
      position: relative;
      z-index: 1;
      background-color: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 350px;
      margin: auto;
      top: 50%;
      transform: translateY(-50%);
    }

    /* Botón Regresar */
    .btn-back {
      position: absolute;
      top: 15px;
      left: 15px;
      padding: 8px 16px;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s ease;
      z-index: 10;
    }

    .btn-back:hover {
      background-color: #0072ff;
      transform: translateX(-3px);
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #0072ff;
      margin-top: 20px; /* espacio para el botón */
    }

    .login-box label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }

    .login-box input[type="text"],
    .login-box input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: 0.3s ease;
    }

    .login-box input[type="text"]:focus,
    .login-box input[type="password"]:focus {
      border-color: #0072ff;
      box-shadow: 0 0 5px rgba(0, 114, 255, 0.3);
    }

    .login-box input[type="submit"] {
      width: 100%;
      padding: 12px;
      background-color: #0072ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .login-box input[type="submit"]:hover {
      background-color: #005bb5;
    }

    .login-box .extra {
      text-align: center;
      margin-top: 15px;
    }

    .login-box .extra a {
      text-decoration: none;
      color: #0072ff;
      font-size: 14px;
    }

    .login-box .extra a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <button onclick="window.history.back()" class="btn-back">
      ← Regresar
    </button>

    <h2>Iniciar Sesión</h2>
    <form action="#" method="post" id="formularioLogin">
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" name="usuario" required />

      <label for="contrasena">Contraseña</label>
      <input type="password" id="contrasena" name="contrasena" required />

      <input type="submit" value="Entrar" />
    </form>

    <div class="extra">
      <p><a href="recuperar.html">¿Olvidaste tu contraseña?</a></p>
      <p><a href="registro.html">Crear cuenta nueva</a></p>
    </div>
  </div>

  <script type="text/javascript" src="login.js"></script>
</body>
</html>
