<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar Contraseña</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    height:100vh;
    background:url('img/login.jpg') no-repeat center center fixed;
    background-size:cover;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
}

.contenedor{
    position:relative;
    z-index:1;
    max-width:400px;
    margin:auto;
    top:50%;
    transform:translateY(-50%);
    background:rgba(255,255,255,.95);
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    color:#0072ff;
    margin-bottom:15px;
}

p{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0072ff;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#005ecc;
}

.resultado{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    color:#333;
}

.volver{
    text-align:center;
    margin-top:15px;
}

.volver a{
    color:#0072ff;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="contenedor">

    <h2>Recuperar Contraseña</h2>

    <p>Ingresa tu usuario registrado</p>

    <form id="formRecuperar">

        <label>Usuario</label>
        <input type="text" id="usuario" required>

        <button type="submit">Buscar</button>

    </form>

    <div class="resultado" id="resultado"></div>

    <div class="volver">
        <a href="login.html">Volver al inicio de sesión</a>
    </div>

</div>

<script>

document.getElementById("formRecuperar").addEventListener("submit", function(e){

    e.preventDefault();

    const usuarioIngresado = document.getElementById("usuario").value;

    const usuarioGuardado = localStorage.getItem("usuario");
    const contrasenaGuardada = localStorage.getItem("contrasena");

    const resultado = document.getElementById("resultado");

    if(usuarioIngresado === usuarioGuardado){
        resultado.innerHTML = "Tu contraseña es: " + contrasenaGuardada;
    }else{
        resultado.innerHTML = "Usuario no encontrado";
    }

});

</script>

</body>
</html>
